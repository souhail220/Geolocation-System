services:
  auth-service:
    image: ditoo2/geo-authservice:latest
    container_name: AuthService
    ports:
      - 8080:8080
    networks:
      - backend-network

  notification-service:
    image: ditoo2/geo-notificationservice:latest
    container_name: NotificationService
    ports:
      - 8082:8082
    networks:
      - backend-network

  radio-management-service:
    image: ditoo2/geo-radioservice:latest
    container_name: RadioManagementService
    ports:
      - 8081:8081
    networks:
      - backend-network


networks:
  backend-network:
    driver: bridge
